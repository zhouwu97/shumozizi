name: validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-contracts:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run behavior tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python entry points
        run: >-
          python -m py_compile
          scripts/codex/init_run.py
          scripts/codex/validate_state.py
          scripts/runtime/execute_experiment.py
          scripts/runtime/verify_execution.py
          scripts/runtime/accept_result.py
          tests/test_init_run.py
          tests/test_validate_state.py
          tests/test_runtime_execution.py
